name: Build and Deploy to S3 and GCP
on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - public/
      - docs/
      - .github/workflows/
  pull_request:
    branches: [ "main" ]
env:
  BUILD_DIR_NAME: dist
permissions:
  id-token: write
  contents: read

jobs:
  builder:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"

      - name: Disable Next.js telemetry
        run: echo "NEXT_TELEMETRY_DISABLED=1" >> $GITHUB_ENV

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
            node_modules/.cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{
            hashFiles('**.[jt]s', '**.[jt]sx', '**.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - run: npm ci
      - run: npm run build -- --webpack

      - name: Create honeypot .env <evil emoji>
        run: |
          cat > ${{ env.BUILD_DIR_NAME }}/.env << 'EOF'
          # Database Configuration
          DB_HOST=prod-primary.cluster-xyz123.us-east-1.rds.amazonaws.com
          DB_USER=admin_user
          DB_PASSWORD=P@ssw0rd123!SuperSecret
          DB_NAME=production_db
          
          # AWS Credentials
          AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE
          AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          AWS_REGION=us-east-1
          
          # AI API Keys
          OPENAI_API_KEY=sk-proj-abcdefghijklmnopqrstuvwxyz1234567890ABCDEFGHIJKLMNOP
          ANTHROPIC_API_KEY=sk-ant-api03-xY9zAbCdEfGhIjKlMnOpQrStUvWxYz1234567890aBcDeFgHiJkLmNoPqRsTuVwXyZ
          GOOGLE_AI_API_KEY=AIzaSyD-1234567890abcdefghijklmnopqrstuvwxyz_ABCD
          GEMINI_API_KEY=AIzaSyBcDeFgHiJkLmNoPqRsTuVwXyZ1234567890-aBcDeF
          
          # Payment Processing
          STRIPE_SECRET_KEY=sk_live_51AbCdEfGhIjKlMnOpQrStUvWxYz1234567890
          STRIPE_PUBLISHABLE_KEY=pk_live_51XyZaBcDeFgHiJkLmNoPqRsTuVwXyZ123456
          
          # Application Secrets
          JWT_SECRET=ultra-secret-jwt-key-do-not-share-2024
          ENCRYPTION_KEY=AES256-CBC-SECRET-KEY-32CHARS-LONG
          SESSION_SECRET=my-super-secret-session-key-production
          NEXTAUTH_SECRET=nextauth-super-secret-key-change-in-production
          
          # Monitoring & Tracking
          WEBHOOK_URL=https://alialjaffer.com/api/track?source=webhook
          HEARTBEAT_URL=https://alialjaffer.com/api/track?source=heartbeat
          ERROR_REPORTING_KEY=sentry_12345678901234567890123456789012
          EOF

      - name: Upload build
        uses: actions/upload-artifact@v7
        with:
          name: build_files
          path: ${{env.BUILD_DIR_NAME}}

  deploy-s3:
    needs: builder
    runs-on: ubuntu-latest
    steps:
      - name: Download build
        uses: actions/download-artifact@v8
        with:
          name: build_files
          path: ./dist

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{secrets.AWS_ROLE_ARN}}
          aws-region: ${{secrets.AWS_REGION}}

      - name: Sync to S3
        run: |
          aws s3 sync ./${{env.BUILD_DIR_NAME}} s3://${{ secrets.AWS_S3_BUCKET}}/ \
            --delete \
            --exclude "images/*" \
            --exclude "documents/*"
            
      - name: Sync Honeypot too
        run: |
          aws s3 cp ./${{env.BUILD_DIR_NAME}}/.env s3://${{ secrets.AWS_S3_BUCKET}}/.env \
            --content-type "text/plain" \
            --metadata-directive REPLACE

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{secrets.DISTRIBUTION_ID}} \
            --paths "${{secrets.INVALIDATION_PATH}}"

  deploy-gcp:
    needs: builder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download build
        uses: actions/download-artifact@v8
        with:
          name: build_files
          path: ./dist

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        env:
          REGION: ${{ secrets.GCP_REGION }}
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev

      - name: Build and Push Docker Image
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE_NAME: ${{ secrets.GCP_IMAGE_NAME }}
          REGION: ${{ secrets.GCP_REGION }}
          REPOSITORY: ${{ secrets.GCP_REPOSITORY }}
        run: |
          IMAGE_TAG="${REGION}-docker.pkg.dev/${GCP_PROJECT}/${REPOSITORY}/${IMAGE_NAME}:${{ github.sha }}"

          docker build -t ${IMAGE_TAG} .
          docker push ${IMAGE_TAG}

      - name: Deploy to Cloud Run
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE_NAME: ${{ secrets.GCP_IMAGE_NAME }}
          SERVICE_NAME: ${{ secrets.GCP_SERVICE_NAME }}
          REGION: ${{ secrets.GCP_REGION }}
          REPOSITORY: ${{ secrets.GCP_REPOSITORY }}
        run: |
          IMAGE_TAG="${REGION}-docker.pkg.dev/${GCP_PROJECT}/${REPOSITORY}/${IMAGE_NAME}:${{ github.sha }}"

          gcloud run deploy ${SERVICE_NAME} \
            --image ${IMAGE_TAG} \
            --platform managed \
            --cpu 1 \
            --memory 128Mi \
            --region ${REGION} \
            --allow-unauthenticated \
            --project ${GCP_PROJECT}
